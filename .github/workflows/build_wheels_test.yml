name: Build Flash-Attention 3 Wheels (Test build)

on:
  workflow_dispatch:
    inputs:
      cuda_versions:
        description: 'Comma-separated CUDA versions to build (e.g. "12.8,13.0"). Leave empty to use defaults.'
        required: false
        default: ''
      torch_versions:
        description: 'Comma-separated PyTorch versions to build (e.g. "2.8.0,2.11.0"). Leave empty to use defaults.'
        required: false
        default: ''
      max_jobs:
        description: 'MAX_JOBS for ARM build (default 5)'
        required: false
        default: '5'

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      arm-matrix: ${{ steps.arm.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate Arm matrix
        id: arm
        env:
          MATRIX_TARGET: arm
          CUDA_VERSIONS: ${{ inputs.cuda_versions }}
          TORCH_VERSIONS: ${{ inputs.torch_versions }}
        run: python scripts/generate_matrix.py

  build-arm-wheels:
    needs: prepare-matrix
    runs-on: "cirun-gcp-2xl--${{ github.run_id }}"
    timeout-minutes: 1080
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.prepare-matrix.outputs.arm-matrix)}}

    steps:
      - uses: actions/checkout@v6

      - name: Install Google Cloud Ops Agent
        run: |
          curl -sSO https://dl.google.com/cloudagents/add-google-cloud-ops-agent-repo.sh
          sudo bash add-google-cloud-ops-agent-repo.sh --also-install
          sudo systemctl enable google-cloud-ops-agent
          sudo systemctl start google-cloud-ops-agent

      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
          sudo systemctl start docker

      - name: Build wheel in Docker
        run: |
          sudo mkdir -p /tmp/wheels
          sudo docker run --rm \
            -v $PWD:/workspace -v /tmp/wheels:/tmp/wheels \
            -e CUDA="${{ matrix.cuda }}" \
            -e TORCH="${{ matrix.torch }}" \
            nvidia/cuda:${{ matrix.cuda_full }}-devel-ubuntu22.04 \
            bash -c '
              sed -i "s|http://archive.ubuntu.com|http://europe-west4.gce.archive.ubuntu.com|g" /etc/apt/sources.list
              cd /workspace
              apt-get update && apt-get install -y python-is-python3 git ninja-build python3-pip python3-dev
              bash scripts/build_wheel.sh ${{ matrix.cuda }} ${{ matrix.torch }} ${{ inputs.max_jobs || '4' }} | grep -v "ptxas info" | grep -v "bytes stack frame,"
              chmod 666 /tmp/wheels/*.whl
            '

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-arm-cu${{ matrix.cuda }}-torch${{ matrix.torch }}
          path: /tmp/wheels/*.whl
          retention-days: 7
